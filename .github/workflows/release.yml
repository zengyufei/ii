name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            artifact: ii-windows-x86_64.exe
            binary: target/release/ii.exe
          - name: linux-x86_64
            os: ubuntu-latest
            artifact: ii-linux-x86_64
            binary: target/release/ii
          - name: macos-aarch64
            os: macos-latest
            artifact: ii-macos-aarch64
            binary: target/release/ii

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked

      - name: Install UPX
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $upxVersion = "5.2.0"
          $zipPath = "upx-win64.zip"
          $extractDir = "upx"
          Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v$upxVersion/upx-$upxVersion-win64.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
          $upxExe = Get-ChildItem -Path $extractDir -Recurse -Filter upx.exe | Select-Object -First 1
          if (-not $upxExe) { throw "upx.exe not found after extraction" }
          Add-Content -Path $env:GITHUB_PATH -Value $upxExe.Directory.FullName

      - name: Compress Windows binary with UPX
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          upx --best --lzma "${{ matrix.binary }}"

      - name: Prepare Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Prepare Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

[package]
name = "iroh-dns"
version = "1.0.2"
edition = "2024"
description = "DNS-based endpoint discovery for iroh"
license = "MIT OR Apache-2.0"
authors = ["n0 team"]
repository = "https://github.com/n0-computer/iroh"
keywords = ["networking", "pkarr", "dns", "iroh"]
rust-version = "1.91"

[lints]
workspace = true

[dependencies]
derive_more = { version = "2.0.1", features = ["debug"], optional = true }
iroh-base = { version = "1.0.2", path = "../iroh-base", default-features = false, features = ["key", "relay"] }
n0-error = "1.0.0"
n0-future = "0.3"
portable-atomic = { version = "1", optional = true }
rand = { version = "0.10", optional = true }
simple-dns = { version = "0.11", optional = true }
strum = { version = "0.28", features = ["derive"], optional = true }
tokio = { version = "1", features = ["net", "time"] }
url = "2.5.3"

[build-dependencies]
cfg_aliases = "0.2.1"

[features]
default = []
tls-ring = []
tls-aws-lc-rs = []
peer-discovery = [
    "dep:derive_more",
    "dep:portable-atomic",
    "dep:rand",
    "dep:simple-dns",
    "dep:strum",
]

[dev-dependencies]
n0-tracing-test = "0.3"
tokio = { version = "1", features = ["macros", "rt"] }

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "iroh_base::*",
    "n0_error::*",
    "rustls::*",
    "url::*",
    "futures_core::stream::Stream",
    # only type alias
    "futures_lite::future::Boxed",
]
